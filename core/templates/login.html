{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Royal Crown Salon & Spa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0F4C5C, #1a6b7f);
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar { background: #0F4C5C !important; }
        .navbar-brand {
            color: #D4AF37 !important;
            font-weight: 700;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 50%;
            background: #D4AF37;
            color: #0F4C5C;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 15px 40px;
        }
        .login-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 460px;
        }
        .login-header {
            background: linear-gradient(135deg, #0F4C5C, #1a6b7f);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .login-header h2 { font-weight: 700; color: #D4AF37; }
        .form-label {
            color: #0F4C5C;
            font-weight: 600;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
            display: block;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px !important; }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            background: none;
            border: none;
            padding: 0;
            font-size: 1rem;
            z-index: 10;
        }
        .toggle-password:hover { color: #0F4C5C; }
        .error-alert {
            background: #fee2e2;
            border: 2px solid #fca5a5;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #991b1b;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .btn-login {
            background: linear-gradient(135deg, #D4AF37, #c49b2e);
            color: #0F4C5C;
            font-weight: 700;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            border: none;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.4);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <span class="brand-icon"><i class="fas fa-crown"></i></span>
                Royal Crown
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'register' %}">
                    New here? Register
                </a>
            </div>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div style="font-size:2.5rem; color:#D4AF37; margin-bottom:10px;">
                    <i class="fas fa-crown"></i>
                </div>
                <h2>Welcome Back</h2>
                <p style="color:rgba(255,255,255,0.8);">Login to your Royal Crown account</p>
            </div>

            <div class="p-4 p-md-5">

                {% if login_error %}
                <div class="error-alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Incorrect username or password. Please try again.</span>
                </div>
                {% endif %}

                <form method="post" autocomplete="on">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label" for="id_username">Username</label>
                        <input type="text"
                               name="username"
                               id="id_username"
                               value="{% if form.username.value %}{{ form.username.value }}{% endif %}"
                               autocomplete="username"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="id_password">Password</label>
                        <div class="password-wrapper">
                            <input type="password"
                                   name="password"
                                   id="id_password"
                                   autocomplete="current-password"
                                   required>
                            <button type="button"
                                    class="toggle-password"
                                    data-target="id_password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>

                <p class="text-center mt-4 mb-0">
                    Don't have an account?
                    <a href="{% url 'register' %}"
                       style="color:#0F4C5C; font-weight:600;">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.toggle-password');
            if (!btn) return;
            const input = document.getElementById(btn.getAttribute('data-target'));
            const icon = btn.querySelector('i');
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });
    </script>
</body>
</html>
