<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Crown Salon & Spa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #FAF9F6; font-family: 'Playfair Display', serif; }
        .navbar { background: #0F4C5C !important; }
        .logo { color: #D4AF37; font-weight: 700; font-size: 2.2rem; letter-spacing: 2px; }
        .hero {
            background: linear-gradient(rgba(15, 76, 92, 0.75), rgba(15, 76, 92, 0.75)), 
                        url('https://picsum.photos/id/1005/2000/1200') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn-luxury {
            background: #D4AF37;
            color: #0F4C5C;
            font-weight: 600;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
        }
        .btn-luxury:hover {
            background: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand logo" href="{% url 'home' %}">Royal Crown</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'services' %}">Services</a>
                <a class="nav-link" href="{% url 'gallery' %}">Gallery</a>
                <a class="nav-link" href="{% url 'my_bookings' %}">My Bookings</a>
                {% if user.is_authenticated %}
                    <span class="nav-link">Hi, {{ user.username }}</span>
                    <a class="btn btn-outline-light ms-3" href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a class="btn btn-outline-light ms-3" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-luxury ms-2" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <section class="hero text-center">
        <div class="container">
            <h1 class="display-3 fw-bold mb-3">Transform Your Beauty Experience</h1>
            <p class="lead mb-4 fs-4">Premium Hair, Braids, Manicure & Pedicure Services Designed For Your Confidence</p>
            <a href="{% url 'services' %}" class="btn btn-luxury btn-lg px-5 py-3">Book Appointment Now</a>
        </div>
    </section>
</body>
</html>
