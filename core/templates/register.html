<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Royal Crown Salon & Spa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #FAF9F6, #f0e6d2); 
            font-family: 'Playfair Display', serif; 
        }
        .register-container {
            max-width: 480px;
            margin: 80px auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .register-header {
            background: linear-gradient(135deg, #0F4C5C, #1a6b7f);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }
        .form-control {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 0.2rem rgba(212, 175, 55, 0.25);
        }
        .btn-register {
            background: #D4AF37;
            color: #0F4C5C;
            font-weight: 700;
            padding: 14px;
            border-radius: 50px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: #0F4C5C;">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="{% url 'home' %}">Royal Crown</a>
        </div>
    </nav>

    <div class="container">
        <div class="register-container">
            <div class="register-header">
                <h2 class="mb-2">Join Our Royal Family</h2>
                <p class="lead">Create your account and experience luxury</p>
            </div>
            
            <div class="p-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-register w-100 mt-4">Create Account</button>
                </form>
                
                <p class="text-center mt-4">
                    Already have an account? 
                    <a href="{% url 'login' %}" class="text-decoration-none" style="color: #0F4C5C;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
