<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Royal Crown Salon & Spa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #FAF9F6; font-family: 'Playfair Display', serif; }
        .navbar { background: #0F4C5C !important; }
        .logo { color: #D4AF37; font-weight: 700; font-size: 1.8rem; }
        
        .booking-container {
            max-width: 800px;
            margin: 100px auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .booking-header {
            background: linear-gradient(135deg, #0F4C5C, #1a6b7f);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }
        .info-box {
            background: #f8f1e3;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .form-label { font-weight: 600; color: #0F4C5C; }
        .form-control, .form-select {
            padding: 14px;
            border-radius: 12px;
        }
        .btn-book {
            background: #0F4C5C;
            color: #D4AF37;
            font-weight: 700;
            padding: 16px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand logo" href="{% url 'home' %}">Royal Crown</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'services' %}">Services</a>
                <a class="nav-link" href="{% url 'my_bookings' %}">My Bookings</a>
                {% if user.is_authenticated %}
                    <span class="nav-link">Hi, {{ user.username }}</span>
                    <a class="btn btn-outline-light ms-3" href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a class="btn btn-outline-light ms-3" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-gold ms-2" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="booking-container mt-5">
            <div class="booking-header">
                <h2>Book Your Appointment</h2>
                <h3 class="mt-2">{{ service.name }}</h3>
            </div>
            
            <div class="p-5">
                <!-- Duration & Price Highlight -->
                <div class="row mb-5">
                    <div class="col-md-6">
                        <div class="info-box">
                            <i class="fas fa-clock fa-2x mb-2" style="color: #0F4C5C;"></i>
                            <h5>Duration</h5>
                            <h3 class="text-success">{{ service.duration }} Minutes</h3>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-box">
                            <i class="fas fa-naira-sign fa-2x mb-2" style="color: #0F4C5C;"></i>
                            <h5>Price</h5>
                            <h3 class="text-success">₦{{ service.price }}</h3>
                        </div>
                    </div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label">Select Stylist</label>
                        <select name="staff_id" class="form-select" required>
                            <option value="">-- Any Available Stylist --</option>
                            {% for staff in staff_list %}
                            <option value="{{ staff.id }}">{{ staff.user.username }} • {{ staff.phone }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Select Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label">Select Time</label>
                        <select name="start_time" class="form-select" required>
                            <option value="">-- Choose Time --</option>
                            <option value="09:00">09:00 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="12:00">12:00 PM</option>
                            <option value="13:00">01:00 PM</option>
                            <option value="14:00">02:00 PM</option>
                            <option value="15:00">03:00 PM</option>
                            <option value="16:00">04:00 PM</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-book w-100">Confirm Appointment</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
